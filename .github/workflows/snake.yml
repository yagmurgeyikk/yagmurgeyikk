name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # HİLE: 300 günlük geçmişin her gününe 20 tane commit basıyoruz (Sarı garantili)
      - name: God Mode Yellow Boost
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          for d in {300..0}; do
            export DATES=$(date -d "-$d days" +%Y-%m-%dT%H:%M:%S)
            for i in {1..20}; do
              echo "FB-Super-Boost-$d-$i" >> boost.txt
              git add boost.txt
              git commit --date "$DATES" -m "Sarı Kanarya Şov"
            done
          done
          git push origin main --force

      # YILAN: Tabloyu geniş tutması ve renkleri oturtması için
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: yagmurgeyikk
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#FED500&color_dots=#00235D,#FED500,#FFD700,#FFCC00,#E6B800
            
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
