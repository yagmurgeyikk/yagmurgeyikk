name: generate animation

on:
  schedule:
    - cron: "0 3 * * *" 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Real Contribution Boost
        run: |
          git config --local user.email "yagmurgeyikk77@gmail.com"
          git config --local user.name "yagmurgeyikk"

          for d in {30..0}; do
            DATE=$(date -d "-$d days" +%Y-%m-%dT12:00:00)
            COUNT=$(( (RANDOM % 2) + 1 ))

            for i in $(seq 1 $COUNT); do
              echo "log-$d-$i-$RANDOM" >> boost.txt
              git add boost.txt
              GIT_AUTHOR_DATE="$DATE" GIT_COMMITTER_DATE="$DATE" git commit -m "update"
            done
          done

          git push origin main
          
      - name: generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: yagmurgeyikk
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#FED500&color_dots=#00235D,#FED500,#FED500,#FED500,#FED500

      - name: push snake
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
