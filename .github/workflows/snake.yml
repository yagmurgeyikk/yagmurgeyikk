name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # HİLE: Son 300 günün her birine 3'er tane sarı commit atar
      - name: Extreme Yellow Boost
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          for d in {300..0}; do
            for i in {1..3}; do
              # Geçmiş tarihlere commit atma büyüsü
              export DATES=$(date -d "-$d days" +%Y-%m-%dT%H:%M:%S)
              echo "FB-Boost-$d-$i" >> boost.txt
              git add boost.txt
              git commit --date "$DATES" -m "Sarı Kanarya Katkısı"
            done
          done
          git push origin main --force

      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: yagmurgeyikk
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#FED500&color_dots=#00235D,#FED500,#FFD700,#FFCC00,#E6B800
            
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
